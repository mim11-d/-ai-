<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MuseBoard — Design Inspiration Generator</title>
  <meta name="description" content="MOOD · COLOR · KEYWORD를 랜덤으로 조합해 디자인 초기 아이디어 브리프를 만들어주는 가벼운 웹앱" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Fraunces:ital,wght@0,500;0,600;1,500;1,600&family=Inter:wght@300;400;500;600;700&family=Orbitron:wght@600;700;800&family=Quicksand:wght@500;600;700&family=Righteous&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- SVG noise filter (reused by mood cards, no external image) -->
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <filter id="grain">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" stitchTiles="stitch" />
      <feColorMatrix type="saturate" values="0" />
    </filter>
  </svg>

  <main class="app">
    <header class="hero">
      <div class="hero__mark" aria-hidden="true">
        <span></span><span></span><span></span>
      </div>
      <h1 class="hero__title">MuseBoard</h1>
      <p class="hero__sub">
        디자인의 시작이 막막한 순간, 버튼 한 번으로
        <strong>Mood · Color · Keyword</strong>를 조합해 새로운 영감을 발견해보세요.
      </p>
      <div class="hero__actions">
        <button id="generate" class="btn btn--primary" type="button">
          Generate Inspiration
        </button>
      </div>
    </header>

    <section id="result" class="result" aria-live="polite" hidden>
      <div class="result__bar">
        <span class="result__index" id="resultIndex">Set 01</span>
        <div class="result__tools">
          <button id="recolor" class="btn btn--ghost" type="button"
            title="무드·키워드는 그대로, 같은 분위기의 새로운 컬러를 다시 뽑습니다">Recolor</button>
          <button id="regenerate" class="btn btn--ghost" type="button"
            title="완전히 새로운 무드·컬러·키워드 세트를 뽑습니다">Regenerate</button>
          <button id="copy" class="btn btn--ghost" type="button">Copy</button>
        </div>
      </div>

      <div class="grid">
        <!-- MOOD -->
        <article class="card card--mood">
          <div class="card__label">Mood</div>
          <div class="mood" id="moodVisual" aria-hidden="true">
            <div class="mood__grain"></div>
          </div>
          <div class="card__foot">
            <h2 class="card__title" id="moodName">—</h2>
            <p class="card__desc" id="moodDesc"></p>
          </div>
        </article>

        <!-- COLOR -->
        <article class="card card--color">
          <div class="card__label">Color Palette</div>
          <div class="swatches" id="swatches"></div>
          <div class="card__foot">
            <p class="card__desc">탭하면 HEX가 복사됩니다.</p>
          </div>
        </article>

        <!-- KEYWORD -->
        <article class="card card--keyword">
          <div class="card__label">Keywords</div>
          <ul class="keywords" id="keywords"></ul>
          <div class="card__foot">
            <p class="card__desc">컨셉을 풀어갈 출발 단어 세 개.</p>
          </div>
        </article>
      </div>
    </section>

    <footer class="foot">
      <span>Pure HTML · CSS · JS — no dependencies, no server.</span>
    </footer>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="script.js"></script>
</body>
</html>
